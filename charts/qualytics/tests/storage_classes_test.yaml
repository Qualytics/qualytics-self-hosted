suite: test storage classes
templates:
  - storage-classes.yaml
tests:
  - it: should render AWS storage class when platform is AWS
    set:
      storageClass.create: true
      global.platform: "aws"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: StorageClass
        documentIndex: 0
      - equal:
          path: metadata.name
          value: "aws"
        documentIndex: 0
      - equal:
          path: provisioner
          value: "ebs.csi.aws.com"
        documentIndex: 0

  - it: should render GCP storage classes when platform is GCP
    set:
      storageClass.create: true
      global.platform: "gcp"
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: StorageClass
        documentIndex: 0
      - isKind:
          of: StorageClass
        documentIndex: 1

  - it: should configure GCP fast storage class
    set:
      storageClass.create: true
      global.platform: "gcp"
    asserts:
      - equal:
          path: metadata.name
          value: "gcp-fast"
        documentIndex: 0
      - equal:
          path: provisioner
          value: "kubernetes.io/gce-pd"
        documentIndex: 0
      - equal:
          path: parameters.type
          value: "pd-ssd"
        documentIndex: 0

  - it: should configure GCP slow storage class
    set:
      storageClass.create: true
      global.platform: "gcp"
    asserts:
      - equal:
          path: metadata.name
          value: "gcp-slow"
        documentIndex: 1
      - equal:
          path: provisioner
          value: "kubernetes.io/gce-pd"
        documentIndex: 1
      - equal:
          path: parameters.type
          value: "pd-standard"
        documentIndex: 1

  - it: should render Azure storage classes when platform is Azure
    set:
      storageClass.create: true
      global.platform: "azure"
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: "azure-slow"
        documentIndex: 0
      - equal:
          path: metadata.name
          value: "azure-fast"
        documentIndex: 1

  - it: should not render storage class for unsupported platforms
    set:
      storageClass.create: true
      global.platform: "other"
    asserts:
      - hasDocuments:
          count: 0

  - it: should set volume binding mode to WaitForFirstConsumer
    set:
      storageClass.create: true
      global.platform: "aws"
    asserts:
      - equal:
          path: volumeBindingMode
          value: "WaitForFirstConsumer"
        documentIndex: 0

  - it: should allow volume expansion
    set:
      storageClass.create: true
      global.platform: "gcp"
    asserts:
      - equal:
          path: allowVolumeExpansion
          value: true
        documentIndex: 0
      - equal:
          path: allowVolumeExpansion
          value: true
        documentIndex: 1

  # Auto-skip when no in-chart resource consumes a storage class. Composes with
  # storageClass.create — the explicit opt-in still wins (false → never render), and the
  # auto-skip layers on top to avoid emitting unused / colliding StorageClass objects.
  - it: should NOT render any storage class when postgres is external AND rabbitmq is ephemeral
    set:
      storageClass.create: true
      global.platform: "aws"
      postgres.enabled: false
      rabbitmq.pvc.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should still render storage classes when postgres is external but rabbitmq uses PVC
    set:
      storageClass.create: true
      global.platform: "gcp"
      postgres.enabled: false
      rabbitmq.pvc.enabled: true
    asserts:
      - hasDocuments:
          count: 2

  - it: should still render storage classes when rabbitmq is ephemeral but postgres uses PVC
    set:
      storageClass.create: true
      global.platform: "aws"
      postgres.enabled: true
      rabbitmq.pvc.enabled: false
    asserts:
      - hasDocuments:
          count: 1

  - it: should respect storageClass.create=false even when consumers are present
    set:
      storageClass.create: false
      global.platform: "aws"
      postgres.enabled: true
      rabbitmq.pvc.enabled: true
    asserts:
      - hasDocuments:
          count: 0
