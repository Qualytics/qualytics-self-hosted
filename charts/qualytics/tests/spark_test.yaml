suite: test spark application
templates:
  - spark.yaml
tests:
  - it: should render exactly one SparkApplication document
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: SparkApplication

  - it: should render SparkApplication with default values
    asserts:
      - isKind:
          of: SparkApplication
      - equal:
          path: metadata.name
          value: RELEASE-NAME-spark
      - equal:
          path: spec.type
          value: Scala
      - equal:
          path: spec.mode
          value: cluster
      - equal:
          path: spec.mainClass
          value: io.qualytics.dataplane.SparkMothership

  - it: should not be a helm hook (normal release-tracked resource)
    asserts:
      - notExists:
          path: metadata.annotations["helm.sh/hook"]

  # Platform-specific volume configuration — stays on the CR (operator
  # special-cases spark-local-dir-* volumes into --conf for spark-submit).
  - it: should configure AWS platform volumes correctly
    set:
      global.platform: aws
      dataplane.numVolumes: 2
    asserts:
      - contains:
          path: spec.volumes
          content:
            name: spark-local-dir-1
            hostPath:
              path: /mnt/disks/nvme1n1/spark-local-dir-1
      - contains:
          path: spec.volumes
          content:
            name: spark-local-dir-2
            hostPath:
              path: /mnt/disks/nvme2n1/spark-local-dir-2

  - it: should configure GCP platform volumes correctly
    set:
      global.platform: gcp
      dataplane.numVolumes: 2
    asserts:
      - contains:
          path: spec.volumes
          content:
            name: spark-local-dir-1
            hostPath:
              path: /mnt/disks/ssd0/spark-local-dir-1
      - contains:
          path: spec.volumes
          content:
            name: spark-local-dir-2
            hostPath:
              path: /mnt/disks/ssd1/spark-local-dir-2

  - it: should configure driver resources from template values
    set:
      dataplane.driver.cores: 4
      dataplane.driver.memory: "32000m"
    asserts:
      - equal:
          path: spec.driver.cores
          value: 4
      - equal:
          path: spec.driver.memory
          value: "32000m"

  - it: should configure executor resources from template values
    set:
      dataplane.executor.instances: 2
      dataplane.executor.cores: 8
      dataplane.executor.memory: "64000m"
    asserts:
      - equal:
          path: spec.executor.instances
          value: 2
      - equal:
          path: spec.executor.cores
          value: 8
      - equal:
          path: spec.executor.memory
          value: "64000m"

  - it: should configure dynamic allocation from template values
    set:
      dataplane.dynamicAllocation.enabled: true
      dataplane.dynamicAllocation.initialExecutors: 2
      dataplane.dynamicAllocation.minExecutors: 1
      dataplane.dynamicAllocation.maxExecutors: 20
    asserts:
      - equal:
          path: spec.dynamicAllocation.enabled
          value: true
      - equal:
          path: spec.dynamicAllocation.initialExecutors
          value: 2
      - equal:
          path: spec.dynamicAllocation.minExecutors
          value: 1
      - equal:
          path: spec.dynamicAllocation.maxExecutors
          value: 20

  - it: should not have volumes section when no volumes configured
    set:
      dataplane.numVolumes: -1
    asserts:
      - notExists:
          path: spec.volumes

  - it: should configure numVolumes from template values
    set:
      dataplane.numVolumes: 3
      global.platform: aws
    asserts:
      - lengthEqual:
          path: spec.volumes
          count: 3
      - contains:
          path: spec.volumes
          content:
            name: spark-local-dir-3
            hostPath:
              path: /mnt/disks/nvme3n1/spark-local-dir-3

  # Pod template assertions (env, nodeSelector, tolerations, init container).
  - it: should emit driver pod template with required container name
    asserts:
      - equal:
          path: spec.driver.template.spec.containers[0].name
          value: spark-kubernetes-driver

  - it: should emit executor pod template with required container name when kerberos is enabled
    set:
      dataplane.kerberos.enabled: true
      dataplane.kerberos.keytab: "/etc/kerberos/keytab/hive.keytab"
    asserts:
      - equal:
          path: spec.executor.template.spec.containers[0].name
          value: spark-kubernetes-executor

  # Regression test: Spark 4.1.1 NPEs loading an executor pod template that
  # has no containers field, which crashed every prod cluster (kerberos off).
  - it: should always emit executor containers[0].name regardless of kerberos
    set:
      dataplane.kerberos.enabled: false
    asserts:
      - equal:
          path: spec.executor.template.spec.containers[0].name
          value: spark-kubernetes-executor
      - isKind:
          of: SparkApplication

  - it: should not leak kerberos env or volumeMounts into executor container when disabled
    set:
      dataplane.kerberos.enabled: false
    asserts:
      - notExists:
          path: spec.executor.template.spec.containers[0].env
      - notExists:
          path: spec.executor.template.spec.containers[0].volumeMounts

  - it: should always emit driver containers[0].name regardless of kerberos
    set:
      dataplane.kerberos.enabled: false
    asserts:
      - equal:
          path: spec.driver.template.spec.containers[0].name
          value: spark-kubernetes-driver

  - it: should place MOTHERSHIP env vars in driver pod template container
    asserts:
      - contains:
          path: spec.driver.template.spec.containers[0].env
          content:
            name: MOTHERSHIP_RABBIT_HOST
            value: "RELEASE-NAME-rabbitmq"
      - contains:
          path: spec.driver.template.spec.containers[0].env
          content:
            name: MOTHERSHIP_RABBIT_USER
            value: "user"
      - contains:
          path: spec.driver.template.spec.containers[0].env
          content:
            name: MOTHERSHIP_RABBIT_PASS
            valueFrom:
              secretKeyRef:
                name: qualytics-creds
                key: rabbitmq_password

  - it: should set parallelism scale factor environment variable
    set:
      dataplane.parallelismScaleFactor: 0.5
    asserts:
      - contains:
          path: spec.driver.template.spec.containers[0].env
          content:
            name: MOTHERSHIP_PARALLELISM_SCALE_FACTOR
            value: "0.5"

  - it: should set max parallel sync requests environment variable
    set:
      dataplane.maxParallelSyncRequests: 5
    asserts:
      - contains:
          path: spec.driver.template.spec.containers[0].env
          content:
            name: MOTHERSHIP_MAX_PARALLEL_SYNC_REQUESTS
            value: "5"

  - it: should configure driver node selector in pod template
    set:
      driverNodeSelector:
        driverNodes: "true"
        zone: "us-east-1a"
    asserts:
      - equal:
          path: spec.driver.template.spec.nodeSelector.driverNodes
          value: "true"
      - equal:
          path: spec.driver.template.spec.nodeSelector.zone
          value: "us-east-1a"
      - notExists:
          path: spec.driver.nodeSelector

  - it: should configure executor node selector in pod template
    set:
      executorNodeSelector:
        executorNodes: "true"
        instanceType: "c5.large"
    asserts:
      - equal:
          path: spec.executor.template.spec.nodeSelector.executorNodes
          value: "true"
      - equal:
          path: spec.executor.template.spec.nodeSelector.instanceType
          value: "c5.large"
      - notExists:
          path: spec.executor.nodeSelector

  - it: should configure driver tolerations in pod template
    set:
      tolerations.driverNodeTolerations:
        - key: driverNodes
          operator: Equal
          value: "true"
          effect: NoSchedule
    asserts:
      - contains:
          path: spec.driver.template.spec.tolerations
          content:
            key: driverNodes
            operator: Equal
            value: "true"
            effect: NoSchedule

  - it: should configure executor tolerations in pod template
    set:
      tolerations.executorNodeTolerations:
        - key: executorNodes
          operator: Equal
          value: "true"
          effect: NoSchedule
    asserts:
      - contains:
          path: spec.executor.template.spec.tolerations
          content:
            key: executorNodes
            operator: Equal
            value: "true"
            effect: NoSchedule

  - it: should use configured service account on driver
    set:
      sparkoperator.spark.serviceAccount.name: "custom-spark-sa"
    asserts:
      - equal:
          path: spec.driver.serviceAccount
          value: "custom-spark-sa"

  - it: should not render when dataplane is disabled
    set:
      dataplane.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when deploymentMode is databricks
    set:
      global.deploymentMode: "databricks"
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when deploymentMode is databricks even if dataplane is enabled
    set:
      dataplane.enabled: true
      global.deploymentMode: "databricks"
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when deploymentMode is kubernetes and dataplane is enabled
    set:
      dataplane.enabled: true
      global.deploymentMode: "kubernetes"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: SparkApplication

  # Kerberos — volumes go in both driver and executor pod templates.
  - it: should not configure kerberos volumes when kerberos is disabled
    set:
      dataplane.kerberos.enabled: false
    asserts:
      - notExists:
          path: spec.driver.template.spec.volumes
      - notExists:
          path: spec.executor.template.spec.volumes

  - it: should configure kerberos volumes in driver pod template when enabled
    set:
      dataplane.kerberos.enabled: true
      dataplane.kerberos.keytab: "/etc/kerberos/keytab/hive.keytab"
    asserts:
      - contains:
          path: spec.driver.template.spec.volumes
          content:
            name: "krb5-conf"
            secret:
              items:
                - key: krb5.conf
                  path: krb5.conf
              secretName: krb5-conf
      - contains:
          path: spec.driver.template.spec.volumes
          content:
            name: "keytab"
            secret:
              items:
                - key: app.keytab
                  path: hive.keytab
              secretName: hive-client-keytab

  - it: should configure kerberos volumes in executor pod template when enabled
    set:
      dataplane.kerberos.enabled: true
      dataplane.kerberos.keytab: "/etc/kerberos/keytab/hive.keytab"
    asserts:
      - contains:
          path: spec.executor.template.spec.volumes
          content:
            name: "krb5-conf"
            secret:
              items:
                - key: krb5.conf
                  path: krb5.conf
              secretName: krb5-conf
      - contains:
          path: spec.executor.template.spec.volumes
          content:
            name: "keytab"
            secret:
              items:
                - key: app.keytab
                  path: hive.keytab
              secretName: hive-client-keytab

  - it: should configure kerberos environment variables in driver pod template when enabled
    set:
      dataplane.kerberos.enabled: true
      dataplane.kerberos.krb5: "/etc/kerberos/conf/krb5.conf"
      dataplane.kerberos.keytab: "/etc/kerberos/keytab/hive.keytab"
      dataplane.kerberos.principal: "hive/hadoop@EXAMPLE.COM"
    asserts:
      - contains:
          path: spec.driver.template.spec.containers[0].env
          content:
            name: "MOTHERSHIP_SPARK_KRB_KRB5"
            value: "/etc/kerberos/conf/krb5.conf"
      - contains:
          path: spec.driver.template.spec.containers[0].env
          content:
            name: "MOTHERSHIP_SPARK_KRB_KEYTAB"
            value: "/etc/kerberos/keytab/hive.keytab"
      - contains:
          path: spec.driver.template.spec.containers[0].env
          content:
            name: "MOTHERSHIP_SPARK_KRB_PRINCIPAL"
            value: "hive/hadoop@EXAMPLE.COM"
      - contains:
          path: spec.driver.template.spec.containers[0].env
          content:
            name: "KERBEROS_DAEMON_ENABLED"
            value: "false"

  - it: should configure kerberos environment variables in executor pod template when enabled
    set:
      dataplane.kerberos.enabled: true
      dataplane.kerberos.krb5: "/etc/kerberos/conf/krb5.conf"
      dataplane.kerberos.keytab: "/etc/kerberos/keytab/hive.keytab"
      dataplane.kerberos.principal: "hive/hadoop@EXAMPLE.COM"
    asserts:
      - contains:
          path: spec.executor.template.spec.containers[0].env
          content:
            name: "KRB5_CONFIG"
            value: "/etc/kerberos/conf/krb5.conf"
      - contains:
          path: spec.executor.template.spec.containers[0].env
          content:
            name: "KRB_KEYTAB"
            value: "/etc/kerberos/keytab/hive.keytab"
      - contains:
          path: spec.executor.template.spec.containers[0].env
          content:
            name: "KRB_PRINCIPAL"
            value: "hive/hadoop@EXAMPLE.COM"
      - contains:
          path: spec.executor.template.spec.containers[0].env
          content:
            name: "SPARK_JAVA_OPT_998"
            value: "-Djava.security.krb5.conf=/etc/kerberos/conf/krb5.conf"
      - contains:
          path: spec.executor.template.spec.containers[0].env
          content:
            name: "SPARK_JAVA_OPT_999"
            value: "-Djavax.security.auth.useSubjectCredsOnly=false"

  - it: should configure kerberos volume mounts in driver pod template when enabled
    set:
      dataplane.kerberos.enabled: true
      dataplane.kerberos.krb5: "/etc/kerberos/conf/krb5.conf"
      dataplane.kerberos.keytab: "/etc/kerberos/keytab/hive.keytab"
    asserts:
      - contains:
          path: spec.driver.template.spec.containers[0].volumeMounts
          content:
            name: "krb5-conf"
            mountPath: "/etc/kerberos/conf/krb5.conf"
            subPath: "krb5.conf"
      - contains:
          path: spec.driver.template.spec.containers[0].volumeMounts
          content:
            name: "keytab"
            mountPath: "/etc/kerberos/keytab/hive.keytab"
            subPath: "hive.keytab"

  - it: should configure kerberos volume mounts in executor pod template when enabled
    set:
      dataplane.kerberos.enabled: true
      dataplane.kerberos.krb5: "/etc/kerberos/conf/krb5.conf"
      dataplane.kerberos.keytab: "/etc/kerberos/keytab/hive.keytab"
    asserts:
      - contains:
          path: spec.executor.template.spec.containers[0].volumeMounts
          content:
            name: "krb5-conf"
            mountPath: "/etc/kerberos/conf/krb5.conf"
            subPath: "krb5.conf"
      - contains:
          path: spec.executor.template.spec.containers[0].volumeMounts
          content:
            name: "keytab"
            mountPath: "/etc/kerberos/keytab/hive.keytab"
            subPath: "hive.keytab"

  - it: should not configure kerberos environment variables when disabled
    set:
      dataplane.kerberos.enabled: false
    asserts:
      - notExists:
          path: spec.driver.template.spec.containers[0].env[?(@.name == "MOTHERSHIP_SPARK_KRB_KRB5")]
      - notExists:
          path: spec.driver.template.spec.containers[0].env[?(@.name == "MOTHERSHIP_SPARK_KRB_KEYTAB")]
      - notExists:
          path: spec.driver.template.spec.containers[0].env[?(@.name == "MOTHERSHIP_SPARK_KRB_PRINCIPAL")]
      - notExists:
          path: spec.driver.template.spec.containers[0].env[?(@.name == "KERBEROS_DAEMON_ENABLED")]
      - notExists:
          path: spec.executor.template.spec.containers[0].env

  - it: should extract filename from keytab path for custom keytab names
    set:
      dataplane.kerberos.enabled: true
      dataplane.kerberos.krb5: "/etc/kerberos/conf/krb5.conf"
      dataplane.kerberos.keytab: "/etc/kerberos/keytab/my-service.keytab"
      dataplane.kerberos.principal: "my-service/hostname@REALM"
    asserts:
      - contains:
          path: spec.driver.template.spec.volumes
          content:
            name: "keytab"
            secret:
              items:
                - key: app.keytab
                  path: my-service.keytab
              secretName: hive-client-keytab
      - contains:
          path: spec.driver.template.spec.containers[0].volumeMounts
          content:
            name: "keytab"
            mountPath: "/etc/kerberos/keytab/my-service.keytab"
            subPath: "my-service.keytab"
      - contains:
          path: spec.executor.template.spec.containers[0].volumeMounts
          content:
            name: "keytab"
            mountPath: "/etc/kerberos/keytab/my-service.keytab"
            subPath: "my-service.keytab"

  - it: should emit init-spark-local-dir in executor pod template when numVolumes > 0
    set:
      dataplane.numVolumes: 2
      global.platform: aws
    asserts:
      - equal:
          path: spec.executor.template.spec.initContainers[0].name
          value: init-spark-local-dir
      - equal:
          path: spec.executor.template.spec.initContainers[0].command
          value: ['sh', '-c', 'chmod 777 /tmp/spark-local-dir-*']
      - contains:
          path: spec.executor.template.spec.initContainers[0].volumeMounts
          content:
            name: spark-local-dir-1
            mountPath: /tmp/spark-local-dir-1
      - contains:
          path: spec.executor.template.spec.initContainers[0].volumeMounts
          content:
            name: spark-local-dir-2
            mountPath: /tmp/spark-local-dir-2

  - it: should not emit init container when numVolumes is not set
    set:
      dataplane.numVolumes: -1
    asserts:
      - notExists:
          path: spec.executor.template.spec.initContainers

  - it: should keep executor volumeMounts for spark-local-dir on the CR
    set:
      dataplane.numVolumes: 2
      global.platform: aws
    asserts:
      - contains:
          path: spec.executor.volumeMounts
          content:
            name: spark-local-dir-1
            mountPath: /tmp/spark-local-dir-1
      - contains:
          path: spec.executor.volumeMounts
          content:
            name: spark-local-dir-2
            mountPath: /tmp/spark-local-dir-2
