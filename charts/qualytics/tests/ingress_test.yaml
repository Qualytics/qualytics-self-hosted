suite: test ingress resources
templates:
  - ingress.yaml
tests:
  - it: should not render ingress when disabled
    set:
      ingress.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ingress resources when enabled
    set:
      ingress.enabled: true
      global.dnsRecord: "test.qualytics.io"
    asserts:
      - hasDocuments:
          count: 3
      - isKind:
          of: Ingress
        documentIndex: 0
      - isKind:
          of: Ingress
        documentIndex: 1
      - isKind:
          of: Ingress
        documentIndex: 2

  - it: should create API streaming ingress with correct configuration
    set:
      ingress.enabled: true
      global.dnsRecord: "test.qualytics.io"
    asserts:
      - equal:
          path: metadata.name
          value: "RELEASE-NAME-api-streaming-ingress"
        documentIndex: 0
      - equal:
          path: spec.rules[0].host
          value: "test.qualytics.io"
        documentIndex: 0
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: "/api/anomalies/[0-9]+/source-record/download(.*)"
        documentIndex: 0
      # Verify higher priority for streaming
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/priority"]
          value: "100"
        documentIndex: 0
      # Verify buffering is disabled
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-buffering"]
          value: "off"
        documentIndex: 0
      # Verify OWASP rules are disabled for streaming
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/enable-owasp-core-rules"]
          value: "false"
        documentIndex: 0

  - it: should create API regular ingress with correct configuration
    set:
      ingress.enabled: true
      global.dnsRecord: "test.qualytics.io"
    asserts:
      - equal:
          path: metadata.name
          value: "RELEASE-NAME-api-ingress"
        documentIndex: 1
      - equal:
          path: spec.rules[0].host
          value: "test.qualytics.io"
        documentIndex: 1
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: "/api/?(.*)"
        documentIndex: 1
      # Verify lower priority for regular API
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/priority"]
          value: "10"
        documentIndex: 1
      # Verify buffering is enabled
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-buffering"]
          value: "on"
        documentIndex: 1
      # Verify OWASP rules are enabled for regular API
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/enable-owasp-core-rules"]
          value: "true"
        documentIndex: 1

  - it: should create frontend ingress with correct configuration
    set:
      ingress.enabled: true
      global.dnsRecord: "test.qualytics.io"
    asserts:
      - equal:
          path: metadata.name
          value: "RELEASE-NAME-frontend-ingress"
        documentIndex: 2
      - equal:
          path: spec.rules[0].host
          value: "test.qualytics.io"
        documentIndex: 2
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: "/(\\.well-known.*)"
        documentIndex: 2
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: "ImplementationSpecific"
        documentIndex: 2
      - equal:
          path: spec.rules[0].http.paths[1].path
          value: "/?(.*)"
        documentIndex: 2
      # Verify OWASP rules are enabled for frontend
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/enable-owasp-core-rules"]
          value: "true"
        documentIndex: 2
      # Verify frontend has high rate limits (allows parallel asset loading, caps DDoS)
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/limit-rps"]
          value: "500"
        documentIndex: 2
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/limit-connections"]
          value: "1000"
        documentIndex: 2
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/limit-req-status-code"]
          value: "429"
        documentIndex: 2

  - it: should default to legacy split TLS Secret names when no override is set (backwards compatible)
    set:
      ingress.enabled: true
      global.dnsRecord: "test.qualytics.io"
    asserts:
      - contains:
          path: spec.tls
          content:
            hosts:
              - "test.qualytics.io"
            secretName: "api-tls-cert"
        documentIndex: 0
      - contains:
          path: spec.tls
          content:
            hosts:
              - "test.qualytics.io"
            secretName: "api-tls-cert"
        documentIndex: 1
      - contains:
          path: spec.tls
          content:
            hosts:
              - "test.qualytics.io"
            secretName: "frontend-tls-cert"
        documentIndex: 2

  - it: should use a single shared TLS Secret for both api and frontend when ingress.tls.secretName is set
    set:
      ingress.enabled: true
      global.dnsRecord: "test.qualytics.io"
      ingress.tls.secretName: "qualytics-wildcard"
    asserts:
      - contains:
          path: spec.tls
          content:
            hosts:
              - "test.qualytics.io"
            secretName: "qualytics-wildcard"
        documentIndex: 0
      - contains:
          path: spec.tls
          content:
            hosts:
              - "test.qualytics.io"
            secretName: "qualytics-wildcard"
        documentIndex: 1
      - contains:
          path: spec.tls
          content:
            hosts:
              - "test.qualytics.io"
            secretName: "qualytics-wildcard"
        documentIndex: 2

  - it: should let ingress.tls.secretName take precedence over the per-ingress defaults when set
    # When secretName is provided, it wins — the per-ingress api/frontend fields
    # (which default to api-tls-cert / frontend-tls-cert) are ignored.
    set:
      ingress.enabled: true
      global.dnsRecord: "test.qualytics.io"
      ingress.tls.secretName: "shared-wins"
      ingress.tls.apiSecretName: "ignored-api"
      ingress.tls.frontendSecretName: "ignored-frontend"
    asserts:
      - contains:
          path: spec.tls
          content:
            hosts:
              - "test.qualytics.io"
            secretName: "shared-wins"
        documentIndex: 0
      - contains:
          path: spec.tls
          content:
            hosts:
              - "test.qualytics.io"
            secretName: "shared-wins"
        documentIndex: 1
      - contains:
          path: spec.tls
          content:
            hosts:
              - "test.qualytics.io"
            secretName: "shared-wins"
        documentIndex: 2

  - it: should use per-ingress apiSecretName/frontendSecretName when secretName is empty
    set:
      ingress.enabled: true
      global.dnsRecord: "test.qualytics.io"
      ingress.tls.apiSecretName: "custom-api"
      ingress.tls.frontendSecretName: "custom-frontend"
    asserts:
      - contains:
          path: spec.tls
          content:
            hosts:
              - "test.qualytics.io"
            secretName: "custom-api"
        documentIndex: 0
      - contains:
          path: spec.tls
          content:
            hosts:
              - "test.qualytics.io"
            secretName: "custom-api"
        documentIndex: 1
      - contains:
          path: spec.tls
          content:
            hosts:
              - "test.qualytics.io"
            secretName: "custom-frontend"
        documentIndex: 2

  - it: should not include the cert-manager cluster-issuer annotation
    set:
      ingress.enabled: true
      global.dnsRecord: "test.qualytics.io"
    asserts:
      - notExists:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
        documentIndex: 0
      - notExists:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
        documentIndex: 2

  - it: should configure CORS when enabled
    set:
      ingress.enabled: true
      ingress.cors: true
      global.dnsRecord: "test.qualytics.io"
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/enable-cors"]
          value: "true"
        documentIndex: 0

  - it: should configure rate limiting with correct defaults
    set:
      ingress.enabled: true
      global.dnsRecord: "test.qualytics.io"
    asserts:
      # Streaming API ingress rate limiting
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/limit-rps"]
          value: "50"
        documentIndex: 0
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/limit-burst-multiplier"]
          value: "5"
        documentIndex: 0
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/limit-connections"]
          value: "250"
        documentIndex: 0
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/limit-req-status-code"]
          value: "429"
        documentIndex: 0
      # Regular API ingress rate limiting
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/limit-rps"]
          value: "50"
        documentIndex: 1
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/limit-burst-multiplier"]
          value: "5"
        documentIndex: 1
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/limit-connections"]
          value: "250"
        documentIndex: 1
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/limit-req-status-code"]
          value: "429"
        documentIndex: 1

  - it: should configure ModSecurity when enabled
    set:
      ingress.enabled: true
      ingress.modsecurity.enabled: true
      global.dnsRecord: "test.qualytics.io"
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/enable-modsecurity"]
          value: "true"
        documentIndex: 0
