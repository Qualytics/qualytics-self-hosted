suite: test frontend configuration
templates:
  - frontend.yaml
tests:
  # Basic frontend deployment
  - it: should create frontend deployment
    asserts:
      - isKind:
          of: Deployment
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-frontend
        documentIndex: 0

  # Strategy configuration
  - it: should use Recreate strategy for frontend
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate
        documentIndex: 0

  # Health probes
  - it: should have startup probe on /health
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /health
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].startupProbe.initialDelaySeconds
          value: 5
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 12
        documentIndex: 0

  - it: should configure readiness probe on frontend
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health
        documentIndex: 0

  - it: should configure liveness probe on frontend
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 5
        documentIndex: 0

  - it: should create frontend service
    asserts:
      - isKind:
          of: Service
        documentIndex: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-frontend-service
        documentIndex: 1

  # Replica configuration
  - it: should configure frontend replicas
    set:
      frontend.replicas: 2
    asserts:
      - equal:
          path: spec.replicas
          value: 2
        documentIndex: 0

  # Image configuration
  - it: should configure frontend image
    set:
      global.imageUrls.frontendImageUrl: "custom/frontend"
      frontendImage.image.frontendImageTag: "v2.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "custom/frontend:v2.0.0"
        documentIndex: 0

  # Node selector configuration
  - it: should configure frontend node selector
    set:
      appNodeSelector:
        nodeType: "frontend"
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.nodeType
          value: "frontend"
        documentIndex: 0

  # Environment variables
  - it: should set DNS record environment variable
    set:
      global.dnsRecord: "app.qualytics.io"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VITE_QUALYTICS_DNS
            value: "app.qualytics.io"
        documentIndex: 0

  - it: should set auth type environment variable
    set:
      global.authType: "AUTH0"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VITE_QUALYTICS_AUTH_PROVIDER
            value: "AUTH0"
        documentIndex: 0

  # Image pull policy
  - it: should use default image pull policy
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent
        documentIndex: 0

  # Resource limits
  - it: should have default memory limit at 2x requests for frontend
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 256Mi
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi
        documentIndex: 0

  - it: should NOT set CPU limits on frontend
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].resources.limits.cpu
        documentIndex: 0

  - it: should allow custom memory limit override without changing requests for frontend
    set:
      frontend.resources.requests.memory: "256Mi"
      frontend.resources.limits.memory: "1Gi"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 256Mi
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi
        documentIndex: 0

