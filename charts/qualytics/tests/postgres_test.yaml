suite: test postgres configuration
templates:
  - postgres.yaml
tests:
  # Basic PostgreSQL functionality when enabled
  - it: should create postgres resources when enabled
    set:
      postgres.enabled: true
    asserts:
      - hasDocuments:
          count: 6

  - it: should create postgres StatefulSet when enabled
    set:
      postgres.enabled: true
    asserts:
      - isKind:
          of: StatefulSet
        documentIndex: 2
      - equal:
          path: metadata.name
          value: RELEASE-NAME-postgres
        documentIndex: 2

  # PostgreSQL service
  - it: should create postgres service when enabled
    set:
      postgres.enabled: true
    asserts:
      - isKind:
          of: Service
        documentIndex: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-postgres
        documentIndex: 1
      - equal:
          path: spec.ports[0].port
          value: 5432
        documentIndex: 1

  # PVC configuration
  - it: should create postgres data PVC with custom size
    set:
      postgres.enabled: true
      postgres.pvc.storageSize: "100Gi"
    asserts:
      - isKind:
          of: PersistentVolumeClaim
        documentIndex: 0
      - equal:
          path: metadata.name
          value: postgres-data-claim
        documentIndex: 0
      - equal:
          path: spec.resources.requests.storage
          value: "100Gi"
        documentIndex: 0

  - it: should create postgres backup PVC with custom size
    set:
      postgres.enabled: true
      postgres.pvc.backupStorageSize: "50Gi"
    asserts:
      - isKind:
          of: PersistentVolumeClaim
        documentIndex: 3
      - equal:
          path: metadata.name
          value: postgres-snapshots-claim
        documentIndex: 3
      - equal:
          path: spec.resources.requests.storage
          value: "50Gi"
        documentIndex: 3

  # Node selector configuration
  - it: should configure postgres node selector
    set:
      postgres.enabled: true
      appNodeSelector:
        nodeType: "database"
        storageType: "ssd"
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.nodeType
          value: "database"
        documentIndex: 2
      - equal:
          path: spec.template.spec.nodeSelector.storageType
          value: "ssd"
        documentIndex: 2

  # Environment variables
  - it: should configure postgres environment variables
    set:
      postgres.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_USER
            value: "postgres"
        documentIndex: 2
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_DB
            value: "surveillance_hub"
        documentIndex: 2

  # CronJob for snapshots
  - it: should create postgres snapshot cronjob
    set:
      postgres.enabled: true
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 4
      - equal:
          path: metadata.name
          value: RELEASE-NAME-postgres-snapshotter
        documentIndex: 4

  # Resource limits
  - it: should have default memory limit at 2x requests for Postgres
    set:
      postgres.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 10Gi
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 20Gi
        documentIndex: 2

  - it: should NOT set CPU limits on Postgres
    set:
      postgres.enabled: true
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].resources.limits.cpu
        documentIndex: 2

  - it: should allow custom memory limit override without changing requests for Postgres
    set:
      postgres.enabled: true
      postgres.resources.requests.memory: "10Gi"
      postgres.resources.limits.memory: "30Gi"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 10Gi
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 30Gi
        documentIndex: 2

  # CronJob resource limits
  - it: should have memory requests and limits on snapshotter CronJob
    set:
      postgres.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.requests.memory
          value: 1Gi
        documentIndex: 4
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.limits.memory
          value: 2Gi
        documentIndex: 4

  - it: should have CPU requests but NO CPU limits on snapshotter CronJob
    set:
      postgres.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.requests.cpu
          value: 500m
        documentIndex: 4
      - isNull:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.limits.cpu
        documentIndex: 4

  - it: should have memory requests and limits on maintenance CronJob
    set:
      postgres.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi
        documentIndex: 5
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi
        documentIndex: 5

  - it: should have CPU requests but NO CPU limits on maintenance CronJob
    set:
      postgres.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.requests.cpu
          value: 250m
        documentIndex: 5
      - isNull:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.limits.cpu
        documentIndex: 5

  # Postgres memory calculations
  - it: should calculate shared_buffers as 40% of 10Gi memory
    set:
      postgres.enabled: true
      postgres.resources.requests.memory: "10Gi"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "shared_buffers=4080MB"
        documentIndex: 2

  - it: should calculate effective_cache_size as 75% of 10Gi memory
    set:
      postgres.enabled: true
      postgres.resources.requests.memory: "10Gi"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "effective_cache_size=7650MB"
        documentIndex: 2

  - it: should calculate work_mem as 2% of 10Gi memory
    set:
      postgres.enabled: true
      postgres.resources.requests.memory: "10Gi"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "work_mem=204MB"
        documentIndex: 2

  - it: should calculate maintenance_work_mem as 10% of 10Gi memory
    set:
      postgres.enabled: true
      postgres.resources.requests.memory: "10Gi"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "maintenance_work_mem=1020MB"
        documentIndex: 2

  - it: should recalculate memory settings at 16Gi
    set:
      postgres.enabled: true
      postgres.resources.requests.memory: "16Gi"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "shared_buffers=6520MB"
        documentIndex: 2
      - contains:
          path: spec.template.spec.containers[0].args
          content: "effective_cache_size=12225MB"
        documentIndex: 2

  # PostgreSQL disabled
  - it: should not create postgres resources when disabled
    set:
      postgres.enabled: false
    asserts:
      - hasDocuments:
          count: 0