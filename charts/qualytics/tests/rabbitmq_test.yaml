suite: test rabbitmq configuration
templates:
  - rabbitmq.yaml
tests:
  # Basic RabbitMQ functionality
  - it: should create rabbitmq resources
    asserts:
      - hasDocuments:
          count: 5

  # Basic document checks
  - it: should create rabbitmq StatefulSet
    asserts:
      - isKind:
          of: StatefulSet
        documentIndex: 3

  # PVC vs emptyDir tests
  - it: should create PVC and use persistentVolumeClaim when pvc.enabled is true (default)
    set:
      rabbitmq.pvc.enabled: true
    asserts:
      # PVC resource should exist
      - isKind:
          of: PersistentVolumeClaim
        documentIndex: 2
      - equal:
          path: metadata.name
          value: "rabbitmq-data-claim"
        documentIndex: 2
      # StatefulSet volume should use persistentVolumeClaim
      - contains:
          path: spec.template.spec.volumes
          content:
            name: rabbitmq-data
            persistentVolumeClaim:
              claimName: rabbitmq-data-claim
        documentIndex: 3

  - it: should NOT create PVC and use emptyDir when pvc.enabled is false
    set:
      rabbitmq.pvc.enabled: false
    asserts:
      # Should only have 4 documents (ConfigMap, Secret, StatefulSet, Service - no PVC)
      - hasDocuments:
          count: 4
      - isKind:
          of: ConfigMap
        documentIndex: 0
      - isKind:
          of: Secret
        documentIndex: 1
      - isKind:
          of: StatefulSet
        documentIndex: 2
      - isKind:
          of: Service
        documentIndex: 3
      # StatefulSet volume should use emptyDir
      - contains:
          path: spec.template.spec.volumes
          content:
            name: rabbitmq-data
            emptyDir: {}
        documentIndex: 2

  # Resource limits
  - it: should have default memory limit at 2x requests for RabbitMQ
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 1Gi
        documentIndex: 3
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 2Gi
        documentIndex: 3

  - it: should NOT set CPU limits on RabbitMQ
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].resources.limits.cpu
        documentIndex: 3

  - it: should set fsGroupChangePolicy to OnRootMismatch so .erlang.cookie perms survive pod restarts
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroupChangePolicy
          value: OnRootMismatch
        documentIndex: 3

  - it: should allow custom memory limit override without changing requests for RabbitMQ
    set:
      rabbitmq.resources.requests.memory: "1Gi"
      rabbitmq.resources.limits.memory: "4Gi"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 1Gi
        documentIndex: 3
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 4Gi
        documentIndex: 3

