suite: test rabbitmq configuration
templates:
  - rabbitmq.yaml
tests:
  # Basic RabbitMQ functionality
  - it: should create rabbitmq resources
    asserts:
      - hasDocuments:
          count: 5

  # Basic document checks (default = pvc disabled, so StatefulSet is doc 2)
  - it: should create rabbitmq StatefulSet
    asserts:
      - isKind:
          of: StatefulSet
        documentIndex: 2

  # PVC vs emptyDir tests
  - it: should use emptyDir by default (no PVC, ephemeral state)
    asserts:
      # Should have 5 documents (ConfigMap, Secret, StatefulSet, Service, PDB - no PVC)
      - hasDocuments:
          count: 5
      - isKind:
          of: ConfigMap
        documentIndex: 0
      - isKind:
          of: Secret
        documentIndex: 1
      - isKind:
          of: StatefulSet
        documentIndex: 2
      - isKind:
          of: Service
        documentIndex: 3
      - isKind:
          of: PodDisruptionBudget
        documentIndex: 4
      # StatefulSet volume should use emptyDir
      - contains:
          path: spec.template.spec.volumes
          content:
            name: rabbitmq-data
            emptyDir: {}
        documentIndex: 2

  - it: should create PVC and use persistentVolumeClaim when pvc.enabled is explicitly true
    set:
      rabbitmq.pvc.enabled: true
    asserts:
      - hasDocuments:
          count: 6
      # PVC resource should exist
      - isKind:
          of: PersistentVolumeClaim
        documentIndex: 2
      - equal:
          path: metadata.name
          value: "rabbitmq-data-claim"
        documentIndex: 2
      # StatefulSet volume should use persistentVolumeClaim
      - contains:
          path: spec.template.spec.volumes
          content:
            name: rabbitmq-data
            persistentVolumeClaim:
              claimName: rabbitmq-data-claim
        documentIndex: 3

  # Resource limits — StatefulSet is doc 2 with the default (pvc disabled).
  - it: should have default memory limit at 2x requests for RabbitMQ
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 1Gi
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 2Gi
        documentIndex: 2

  - it: should NOT set CPU limits on RabbitMQ
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].resources.limits.cpu
        documentIndex: 2

  - it: should set fsGroup and fsGroupChangePolicy so .erlang.cookie perms survive pod restarts
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 999
        documentIndex: 2
      - equal:
          path: spec.template.spec.securityContext.fsGroupChangePolicy
          value: OnRootMismatch
        documentIndex: 2

  - it: should run a fix-cookie-perms initContainer to re-lock .erlang.cookie after fsGroup
    # fsGroup applies g+rw to every file in /var/lib/rabbitmq on first mount, which bumps the
    # Erlang cookie from 0600 to 0660 and makes the rabbitmq daemon refuse to start. The init
    # container chmods it back to 0600 on every pod start.
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: "fix-cookie-perms"
        documentIndex: 2
      - contains:
          path: spec.template.spec.initContainers[1].volumeMounts
          content:
            name: rabbitmq-data
            mountPath: /var/lib/rabbitmq
        documentIndex: 2

  - it: should set fsGroup on ephemeral mode too
    set:
      rabbitmq.pvc.enabled: false
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 999
        documentIndex: 2
      - equal:
          path: spec.template.spec.securityContext.fsGroupChangePolicy
          value: OnRootMismatch
        documentIndex: 2

  - it: should allow custom memory limit override without changing requests for RabbitMQ
    set:
      rabbitmq.resources.requests.memory: "1Gi"
      rabbitmq.resources.limits.memory: "4Gi"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 1Gi
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 4Gi
        documentIndex: 2

  - it: should set consumer_timeout to 24h to align with OPERATION_RECONCILER_THRESHOLD_MINUTES
    # The QUA-1752 design relies on `consumer_timeout < OPERATION_RECONCILER_THRESHOLD_MINUTES`
    # (8h). Previously 60min, which routinely fired during large profile ops and caused the
    # SparkMothership ShutdownListener to kill the JVM mid-operation — see PR #39 / dataplane
    # for the listener fix. The 24h value keeps consumer_timeout as a safety net for genuinely
    # hung consumers while never tripping on legitimate long-running async ops.
    asserts:
      - matchRegex:
          path: data["rabbitmq.conf"]
          pattern: "consumer_timeout = 86400000"
        documentIndex: 0

  # QUA-2084: probes guard against premature readiness and self-heal a wedged broker.
  - it: should configure startup, readiness and liveness probes
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.exec.command
          value:
            - rabbitmq-diagnostics
            - -q
            - ping
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 60
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.port
          value: 5672
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.timeoutSeconds
          value: 5
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.exec.command
          value:
            - rabbitmq-diagnostics
            - -q
            - ping
        documentIndex: 2
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 6
        documentIndex: 2

  - it: should publish not-ready addresses so exec probes can resolve the longname nodename pre-Ready
    asserts:
      - equal:
          path: spec.clusterIP
          value: "None"
        documentIndex: 3
      - equal:
          path: spec.publishNotReadyAddresses
          value: true
        documentIndex: 3

  - it: should render PDB with minAvailable 1 matching the StatefulSet pod label
    asserts:
      - containsDocument:
          kind: PodDisruptionBudget
          apiVersion: policy/v1
          name: RELEASE-NAME-rabbitmq
          any: true
      - equal:
          path: spec.minAvailable
          value: 1
        documentIndex: 4
      - equal:
          path: spec.selector.matchLabels.app
          value: RELEASE-NAME-rabbitmq
        documentIndex: 4

  - it: should keep the governing service headless and expose inbound on a dedicated NodePort service
    set:
      rabbitmq.enableInbound: true
      rabbitmq.tls.enabled: true
    asserts:
      - hasDocuments:
          count: 6
      # Governing service (doc 3) stays headless with publishNotReadyAddresses even with inbound on.
      - equal:
          path: spec.clusterIP
          value: "None"
        documentIndex: 3
      - equal:
          path: spec.publishNotReadyAddresses
          value: true
        documentIndex: 3
      # Dedicated inbound NodePort service (doc 5) carries the external AMQP-TLS contract.
      - equal:
          path: metadata.name
          value: "RELEASE-NAME-rabbitmq-inbound"
        documentIndex: 5
      - equal:
          path: spec.type
          value: "NodePort"
        documentIndex: 5
      - equal:
          path: spec.ports[0].nodePort
          value: 30671
        documentIndex: 5
      - lengthEqual:
          path: spec.ports
          count: 1
        documentIndex: 5

