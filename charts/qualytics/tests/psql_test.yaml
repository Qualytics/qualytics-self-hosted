suite: test psql deployment
templates:
  - psql.yaml
tests:
  - it: should render psql deployment when postgres is enabled
    set:
      postgres.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
        documentIndex: 0

  - it: should render psql deployment when postgres is disabled (external)
    set:
      postgres.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
        documentIndex: 0

  - it: should create psql deployment with correct configuration
    set:
      postgres.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: "RELEASE-NAME-psql"
        documentIndex: 0
      - equal:
          path: spec.replicas
          value: 0
        documentIndex: 0

  - it: should use correct image
    set:
      postgres.enabled: true
      postgres.image.imageUrl: "custom/postgres"
      postgres.image.imageTag: "v1.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "custom/postgres:v1.0.0"
        documentIndex: 0

  - it: should set correct container command
    set:
      postgres.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command[0]
          value: "/bin/bash"
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].command[1]
          value: "-c"
        documentIndex: 0

  - it: should mount backup volume when postgres is enabled
    set:
      postgres.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: "postgres-snapshots-pvc"
            persistentVolumeClaim:
              claimName: "postgres-snapshots-claim"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: "postgres-snapshots-pvc"
            mountPath: "/mnt/postgres/data"
        documentIndex: 0

  - it: should not mount volumes when postgres is disabled (external)
    set:
      postgres.enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.volumes
        documentIndex: 0
      - isNull:
          path: spec.template.spec.containers[0].volumeMounts
        documentIndex: 0

  - it: should inject DATABASE_URL from qualytics-creds secret when postgres is disabled (external)
    set:
      postgres.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: qualytics-creds
                key: connection_url
        documentIndex: 0

  - it: should not inject DATABASE_URL when postgres is enabled
    set:
      postgres.enabled: true
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].env
        documentIndex: 0

  - it: should have correct node selector when configured
    set:
      postgres.enabled: true
      appNodeSelector:
        appNodes: "true"
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.appNodes
          value: "true"
        documentIndex: 0
