suite: test global values configuration
templates:
  - spark.yaml
  - ingress.yaml
tests:
  # Platform-specific scratch volumes now land in the executor pod template
  # ConfigMap (the driver Deployment delegates per-executor scheduling to
  # spark-submit, which reads this template). doc 3 is the ConfigMap.
  - it: should configure AWS NVMe paths in the executor pod template
    template: spark.yaml
    documentIndex: 3
    set:
      global.platform: "aws"
      dataplane.numVolumes: 2
    asserts:
      - matchRegex:
          path: data["executor-template.yaml"]
          pattern: "/mnt/disks/nvme1n1/spark-local-dir-1"
      - matchRegex:
          path: data["executor-template.yaml"]
          pattern: "/mnt/disks/nvme2n1/spark-local-dir-2"

  - it: should configure GCP SSD paths in the executor pod template
    template: spark.yaml
    documentIndex: 3
    set:
      global.platform: "gcp"
      dataplane.numVolumes: 2
    asserts:
      - matchRegex:
          path: data["executor-template.yaml"]
          pattern: "/mnt/disks/ssd0/spark-local-dir-1"
      - matchRegex:
          path: data["executor-template.yaml"]
          pattern: "/mnt/disks/ssd1/spark-local-dir-2"

  - it: should fall back to emptyDir for Azure
    template: spark.yaml
    documentIndex: 3
    set:
      global.platform: "azure"
      dataplane.numVolumes: 1
    asserts:
      - matchRegex:
          path: data["executor-template.yaml"]
          pattern: "emptyDir: \\{\\}"

  # DNS record configuration in ingress
  - it: should configure DNS record in ingress
    template: ingress.yaml
    set:
      ingress.enabled: true
      global.dnsRecord: "customer.qualytics.io"
    asserts:
      - equal:
          path: spec.rules[0].host
          value: "customer.qualytics.io"
        documentIndex: 0

  # Image URL — the driver image lives on the Deployment container (doc 5)
  # and is also passed to spark-submit so executors pull the same image.
  - it: should configure dataplane image URL on the driver Deployment
    template: spark.yaml
    documentIndex: 5
    set:
      global.imageUrls.dataplaneImageUrl: "custom-registry/dataplane"
      dataplaneImage.image.dataplaneImageTag: "v2.3.4"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "custom-registry/dataplane:v2.3.4"
      - matchRegex:
          path: spec.template.spec.containers[0].args[0]
          pattern: "spark.kubernetes.container.image=\"custom-registry/dataplane:v2.3.4\""

  # Ingress configuration tests
  - it: should enable ingress when configured
    template: ingress.yaml
    set:
      ingress.enabled: true
      global.dnsRecord: "test.qualytics.io"
    asserts:
      - hasDocuments:
          count: 3
      - isKind:
          of: Ingress
        documentIndex: 0

  - it: should not create ingress when disabled
    template: ingress.yaml
    set:
      ingress.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should configure CORS when enabled
    template: ingress.yaml
    set:
      ingress.enabled: true
      ingress.cors: true
      global.dnsRecord: "test.qualytics.io"
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/enable-cors"]
          value: "true"
        documentIndex: 0

  - it: should disable CORS by default
    template: ingress.yaml
    set:
      ingress.enabled: true
      ingress.cors: false
      global.dnsRecord: "test.qualytics.io"
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/enable-cors"]
          value: "false"
        documentIndex: 0

  # End-to-end: all globals applied at once. Driver image asserted on doc 5,
  # platform-specific scratch path on doc 3.
  - it: should compose globals across the spark templates
    template: spark.yaml
    set:
      global.platform: "gcp"
      global.dnsRecord: "production.qualytics.io"
      global.authType: "OIDC"
      global.imageUrls.dataplaneImageUrl: "gcr.io/project/dataplane"
      dataplaneImage.image.dataplaneImageTag: "latest"
      dataplane.numVolumes: 1
    asserts:
      - isKind:
          of: Deployment
        documentIndex: 5
      - equal:
          path: spec.template.spec.containers[0].image
          value: "gcr.io/project/dataplane:latest"
        documentIndex: 5
      - matchRegex:
          path: data["executor-template.yaml"]
          pattern: "/mnt/disks/ssd0/spark-local-dir-1"
        documentIndex: 3

  # Platform fallback for unknown platforms
  - it: should fall back to emptyDir for unknown platforms
    template: spark.yaml
    documentIndex: 3
    set:
      global.platform: "other"
      dataplane.numVolumes: 1
    asserts:
      - matchRegex:
          path: data["executor-template.yaml"]
          pattern: "emptyDir: \\{\\}"
