{{- /*
  Skip storage class creation when no in-chart resource consumes one. Even with
  storageClass.create: true, if both postgres is external and rabbitmq is on emptyDir,
  the chart produces zero PVCs — so the platform-specific StorageClass declarations
  would be unused at best and could collide with cluster-managed platform-default
  storage classes (e.g. an EKS fleet's pre-existing `aws` SC, which has a Retain
  reclaim policy and so makes accidental conflicts sticky).

  Auto-derived from the existing toggles (no new values knob); composes with
  storageClass.create so the explicit opt-in still wins.
*/}}
{{- if and (eq .Values.storageClass.create true) (or .Values.postgres.enabled .Values.rabbitmq.pvc.enabled) }}

{{- if ( eq .Values.global.platform "aws" ) }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: aws
provisioner: {{ if .Values.global.awsAutoMode }}ebs.csi.eks.amazonaws.com{{ else }}ebs.csi.aws.com{{ end }}
parameters:
  type: gp3
  fsType: ext4
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true

{{- else if ( eq .Values.global.platform "gcp" ) }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gcp-fast
provisioner: kubernetes.io/gce-pd
parameters:
  type: pd-ssd
  fstype: ext4
  replication-type: none
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gcp-slow
provisioner: kubernetes.io/gce-pd
parameters:
  type: pd-standard
  fstype: ext4
  replication-type: regional-pd
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true


{{- else if ( eq .Values.global.platform "azure" ) }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: azure-slow
provisioner: kubernetes.io/azure-disk
parameters:
  storageaccounttype: Standard_LRS
  kind: managed
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: azure-fast
provisioner: kubernetes.io/azure-disk
parameters:
  storageaccounttype: Premium_LRS
  kind: managed
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true
{{- end }}

{{- end }}