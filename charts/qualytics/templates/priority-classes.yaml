{{- if .Values.priorityClasses.create }}
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: qualytics-critical
value: {{ .Values.priorityClasses.criticalValue | int }}
globalDefault: false
description: "High priority for critical stateful services (PostgreSQL, RabbitMQ)"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: qualytics-standard
value: {{ .Values.priorityClasses.standardValue | int }}
globalDefault: false
description: "Standard priority for application workloads"
{{- end }}
