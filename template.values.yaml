######------------------------------------------------------------
# Qualytics Configuration
# This is a simplified version of values.yaml with essential settings
######------------------------------------------------------------

#--------------------------------------------------------------------------------
# Global Configuration (REQUIRED)
#--------------------------------------------------------------------------------
global:
  # Cloud platform: aws, gcp, azure
  platform: "aws"
  # Your DNS record (will be provided by Qualytics)
  dnsRecord: "changeme.qualytics.io"
  # Authentication type: AUTH0 or OIDC (recommended for self-hosted)
  authType: "AUTH0"

#--------------------------------------------------------------------------------
# Authentication Secrets (REQUIRED)
# Choose ONE of the following: Auth0 OR OIDC
# See: https://userguide.qualytics.io/deployments/oidc-configuration/
# See: https://userguide.qualytics.io/deployments/auth0-setup/
#--------------------------------------------------------------------------------
secrets:
  # --- Option A: Auth0 (managed by Qualytics) ---
  # Values provided by your Qualytics account manager
  auth0:
    auth0_domain: auth.qualytics.io
    auth0_audience: changeme-api
    auth0_organization: org_changeme
    auth0_spa_client_id: spa_client_id

  # --- Option B: OIDC (direct IdP integration, recommended for self-hosted) ---
  # Uncomment and configure if using authType: "OIDC"
  # oidc:
  #   # Discovery URL (recommended) — auto-discovers endpoints from your IdP.
  #   # When set, authorization_endpoint, token_endpoint, userinfo_endpoint,
  #   # jwks_uri, and issuer are discovered automatically.
  #   # Examples:
  #   #   Okta:     https://<your-org>.okta.com/.well-known/openid-configuration
  #   #   Entra ID: https://login.microsoftonline.com/<tenant-id>/v2.0/.well-known/openid-configuration
  #   #   Google:   https://accounts.google.com/.well-known/openid-configuration
  #   #   Keycloak: https://<host>/realms/<realm>/.well-known/openid-configuration
  #   oidc_discovery_url: "https://your-idp.example.com/.well-known/openid-configuration"
  #   oidc_scopes: "openid,email,profile"
  #   oidc_client_id: "your-client-id"
  #   oidc_client_secret: "your-client-secret"
  #   # Claims mapping defaults (sub, email, name, given_name, family_name, picture, iss)
  #   # work for most IdPs — only override if your IdP uses non-standard claim names.
  #   # Endpoint overrides (optional when using discovery URL):
  #   # oidc_authorization_endpoint: ""
  #   # oidc_token_endpoint: ""
  #   # oidc_userinfo_endpoint: ""

  # System secrets (CHANGE THESE!)
  auth:
    jwt_signing_secret: ChangeMe!
  postgres:
    password: postgres
    secrets_passphrase: ChangeMe!
  rabbitmq:
    rabbitmq_password: ChangeMe!

#--------------------------------------------------------------------------------
# Node Scheduling (OPTIONAL - remove if not using node selectors)
#--------------------------------------------------------------------------------
# Uncomment and configure if using dedicated node groups
appNodeSelector:
  appNodes: "true"
driverNodeSelector:
  driverNodes: "true"
executorNodeSelector:
  executorNodes: "true"

#--------------------------------------------------------------------------------
# Dependencies
#--------------------------------------------------------------------------------
sparkoperator:
  enabled: true
  controller:
    nodeSelector:
      appNodes: "true"
  webhook:
    enable: true
    nodeSelector:
      appNodes: "true"
  spark:
    jobNamespaces:
    - "qualytics"
    serviceAccount:
      name: "qualytics-spark"

nginx:
  enabled: false
  controller:
    nodeSelector:
      appNodes: "true"

certmanager:
  enabled: false
  nodeSelector:
    appNodes: "true"

#--------------------------------------------------------------------------------
# Ingress Configuration
#--------------------------------------------------------------------------------
ingress:
  enabled: true
  cors: false

#--------------------------------------------------------------------------------
# Controlplane Configuration
#--------------------------------------------------------------------------------
controlplane:
  smtp:
    enabled: false
    server: "email-smtp.us-east-1.amazonaws.com"
    sender: "no-reply@qualytics.co"
    port: "465"
  egress:
    verifyTLSCertificates: true

#--------------------------------------------------------------------------------
# Dataplane configuration
#--------------------------------------------------------------------------------
dataplane:
  enabled: true
  numVolumes: -1
  parallelismScaleFactor: -1
  maxParallelSyncRequests: 3
  driver:
    cores: 7
    memory: "55000m"
  dynamicAllocation:
    enabled: true
    initialExecutors: 1
    minExecutors: 1
    maxExecutors: 12
  executor:
    instances: 1
    cores: 7
    memory: "55000m"

#--------------------------------------------------------------------------------
# Storage Configuration
#--------------------------------------------------------------------------------
postgres:
  enabled: true
  pvc:
    storageSize: "50Gi"
    backupStorageSize: "25Gi"

rabbitmq:
  pvc:
    storageSize: "5Gi"